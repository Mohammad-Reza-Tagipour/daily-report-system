<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Background circle with gradient -->
  <defs>
    <linearGradient id="logoGrad" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
  </defs>
  <rect width="48" height="48" rx="12" fill="url(#logoGrad)"/>
  <!-- Calendar icon -->
  <rect x="10" y="14" width="28" height="24" rx="3" fill="none" stroke="white" stroke-width="2.5"/>
  <!-- Calendar top bar -->
  <rect x="10" y="14" width="28" height="6" rx="3" fill="white"/>
  <!-- Calendar hooks -->
  <line x1="16" y1="11" x2="16" y2="17" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="32" y1="11" x2="32" y2="17" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Check mark -->
  <path d="M18 28 L22 32 L30 24" stroke="#10b981" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
